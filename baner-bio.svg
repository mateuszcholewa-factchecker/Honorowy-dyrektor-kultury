<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 200" width="860" height="200">
  <defs>
    <linearGradient id="bgBio" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="60%" style="stop-color:#1a0a00"/>
      <stop offset="100%" style="stop-color:#2d1500"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8963e"/>
      <stop offset="70%" style="stop-color:#c8963e"/>
      <stop offset="100%" style="stop-color:#c8963e" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="860" height="200" fill="url(#bgBio)"/>

  <!-- Subtle texture lines -->
  <g stroke="#c8963e" stroke-width="0.3" opacity="0.08">
    <line x1="0" y1="20" x2="860" y2="20"/>
    <line x1="0" y1="40" x2="860" y2="40"/>
    <line x1="0" y1="60" x2="860" y2="60"/>
    <line x1="0" y1="80" x2="860" y2="80"/>
    <line x1="0" y1="100" x2="860" y2="100"/>
    <line x1="0" y1="120" x2="860" y2="120"/>
    <line x1="0" y1="140" x2="860" y2="140"/>
    <line x1="0" y1="160" x2="860" y2="160"/>
    <line x1="0" y1="180" x2="860" y2="180"/>
  </g>

  <!-- Left accent block -->
  <rect x="0" y="0" width="6" height="200" fill="#c8963e"/>
  <rect x="10" y="0" width="2" height="200" fill="#c8963e" opacity="0.3"/>

  <!-- Decorative circle (portrait placeholder area) -->
  <circle cx="100" cy="100" r="65" fill="none" stroke="#c8963e" stroke-width="1" opacity="0.4"/>
  <circle cx="100" cy="100" r="55" fill="#1a1208" opacity="0.8"/>
  <!-- Stylized "person" silhouette -->
  <circle cx="100" cy="78" r="18" fill="#c8963e" opacity="0.25"/>
  <ellipse cx="100" cy="125" rx="28" ry="20" fill="#c8963e" opacity="0.2"/>
  <text x="100" y="104" font-family="Georgia, serif" font-size="11" fill="#c8963e" text-anchor="middle" opacity="0.5" letter-spacing="0">fot.</text>

  <!-- Top label -->
  <text x="190" y="45" font-family="Georgia, serif" font-size="10" fill="#c8963e" letter-spacing="4" opacity="0.7">BIOGRAM OFICJALNY</text>

  <!-- Gold separator line -->
  <rect x="190" y="52" width="500" height="1" fill="url(#goldLine)"/>

  <!-- Main name -->
  <text x="190" y="110" font-family="Georgia, serif" font-size="52" fill="#ffffff" font-weight="bold" letter-spacing="-1">Mateusz Holewa</text>

  <!-- Title line -->
  <text x="192" y="138" font-family="Georgia, serif" font-size="13" fill="#c8963e" letter-spacing="1">Dziennikarz kulturalny  ·  Działacz kultury  ·  Honorowy Minister Kultury RP (2012)</text>

  <!-- Bottom separator -->
  <rect x="190" y="152" width="500" height="1" fill="url(#goldLine)"/>

  <!-- Bottom meta -->
  <text x="190" y="173" font-family="Georgia, serif" font-size="10" fill="#ffffff" letter-spacing="2" opacity="0.4">WARSZAWA / POZNAŃ  ·  1979 –</text>

  <!-- Right decorative element -->
  <g stroke="#c8963e" stroke-width="1" fill="none" opacity="0.2">
    <rect x="760" y="30" width="70" height="70" transform="rotate(45 795 65)"/>
    <rect x="760" y="30" width="50" height="50" transform="rotate(45 795 65)"/>
  </g>

  <!-- Right accent -->
  <rect x="854" y="0" width="6" height="200" fill="#c8963e" opacity="0.3"/>
</svg>
