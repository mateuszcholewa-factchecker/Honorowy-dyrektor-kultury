<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="800" height="360">
  <defs>
    <linearGradient id="nightG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#05080f"/>
      <stop offset="100%" style="stop-color:#0a1520"/>
    </linearGradient>
    <radialGradient id="spotG" cx="50%" cy="0%" r="50%" fx="50%" fy="0%" gradientUnits="objectBoundingBox">
      <stop offset="0%" style="stop-color:#fffbe6; stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#fffbe6; stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="spotlight1" cx="35%" cy="0%" r="60%">
      <stop offset="0%" style="stop-color:#c8963e; stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#c8963e; stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="spotlight2" cx="65%" cy="0%" r="60%">
      <stop offset="0%" style="stop-color:#4a7fb5; stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#4a7fb5; stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Night background -->
  <rect width="800" height="360" fill="url(#nightG)"/>

  <!-- Spotlights atmosphere -->
  <rect width="800" height="360" fill="url(#spotlight1)"/>
  <rect width="800" height="360" fill="url(#spotlight2)"/>

  <!-- Stage floor line -->
  <line x1="0" y1="270" x2="800" y2="270" stroke="#c8963e" stroke-width="0.5" opacity="0.3"/>

  <!-- Stage reflection -->
  <rect x="0" y="270" width="800" height="90" fill="#0a1520" opacity="0.5"/>

  <!-- Stylized synagogue arch (Tempel) -->
  <path d="M 280 270 L 280 160 Q 280 100 350 100 Q 420 100 420 160 L 420 270" fill="none" stroke="#c8963e" stroke-width="1" opacity="0.25"/>
  <path d="M 300 270 L 300 170 Q 300 120 350 120 Q 400 120 400 170 L 400 270" fill="none" stroke="#c8963e" stroke-width="0.5" opacity="0.15"/>

  <!-- Star of David subtle -->
  <g stroke="#c8963e" stroke-width="0.8" fill="none" opacity="0.12" transform="translate(350, 155)">
    <polygon points="0,-22 19,11 -19,11"/>
    <polygon points="0,22 19,-11 -19,-11"/>
  </g>

  <!-- Musician silhouette - abstract -->
  <!-- Standing figure at microphone -->
  <ellipse cx="350" cy="215" rx="8" ry="10" fill="#c8963e" opacity="0.5"/>
  <line x1="350" y1="225" x2="350" y2="265" stroke="#c8963e" stroke-width="3" opacity="0.4"/>
  <line x1="350" y1="238" x2="335" y2="255" stroke="#c8963e" stroke-width="2" opacity="0.35"/>
  <line x1="350" y1="238" x2="365" y2="250" stroke="#c8963e" stroke-width="2" opacity="0.35"/>
  <line x1="350" y1="265" x2="340" y2="275" stroke="#c8963e" stroke-width="2" opacity="0.4"/>
  <line x1="350" y1="265" x2="360" y2="275" stroke="#c8963e" stroke-width="2" opacity="0.4"/>
  <!-- Mic stand -->
  <line x1="350" y1="207" x2="350" y2="190" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <circle cx="350" cy="188" r="3" fill="#ffffff" opacity="0.3"/>

  <!-- Music notes floating -->
  <g fill="#c8963e" opacity="0.25" font-family="Georgia, serif" font-size="20">
    <text x="420" y="180">♪</text>
    <text x="450" y="150">♫</text>
    <text x="390" y="145">♩</text>
    <text x="465" y="200">♪</text>
    <text x="280" y="165">♫</text>
    <text x="255" y="195">♩</text>
  </g>

  <!-- Audience dots (abstract) -->
  <g fill="#ffffff" opacity="0.06">
    <circle cx="80" cy="290" r="4"/>
    <circle cx="110" cy="285" r="3"/>
    <circle cx="140" cy="292" r="4"/>
    <circle cx="170" cy="287" r="3"/>
    <circle cx="200" cy="291" r="4"/>
    <circle cx="230" cy="284" r="3"/>
    <circle cx="560" cy="288" r="4"/>
    <circle cx="590" cy="293" r="3"/>
    <circle cx="620" cy="286" r="4"/>
    <circle cx="650" cy="291" r="3"/>
    <circle cx="680" cy="285" r="4"/>
    <circle cx="710" cy="290" r="3"/>
  </g>

  <!-- Top text area -->
  <text x="50" y="55" font-family="Georgia, serif" font-size="11" fill="#c8963e" letter-spacing="3" opacity="0.7">FESTIWAL KULTURY ŻYDOWSKIEJ · KRAKÓW 2012</text>
  <line x1="50" y1="63" x2="450" y2="63" stroke="#c8963e" stroke-width="0.5" opacity="0.3"/>

  <!-- Artist name -->
  <text x="50" y="120" font-family="Georgia, serif" font-size="48" fill="#ffffff" font-weight="bold" opacity="0.9">Károly</text>
  <text x="50" y="175" font-family="Georgia, serif" font-size="48" fill="#c8963e" font-weight="bold">Vásárhelyi</text>

  <!-- Subtitle -->
  <text x="52" y="200" font-family="Georgia, serif" font-size="12" fill="#ffffff" letter-spacing="2" opacity="0.45">muzyka klezmerska i sefardyjska</text>

  <!-- Right info block -->
  <line x1="550" y1="50" x2="750" y2="50" stroke="#c8963e" stroke-width="0.5" opacity="0.3"/>
  <text x="550" y="45" font-family="Georgia, serif" font-size="10" fill="#ffffff" opacity="0.4" letter-spacing="1">NA ZAPROSZENIE</text>
  <text x="550" y="80" font-family="Georgia, serif" font-size="13" fill="#c8963e" letter-spacing="1">Mateusza Holewy</text>
  <text x="550" y="98" font-family="Georgia, serif" font-size="10" fill="#ffffff" opacity="0.5">Honorowego Ministra Kultury RP</text>
  <line x1="550" y1="108" x2="750" y2="108" stroke="#c8963e" stroke-width="0.5" opacity="0.3"/>

  <!-- Date -->
  <text x="550" y="135" font-family="Georgia, serif" font-size="28" fill="#ffffff" font-weight="bold" opacity="0.8">30.VI</text>
  <text x="550" y="158" font-family="Georgia, serif" font-size="13" fill="#c8963e">2012</text>
  <text x="550" y="180" font-family="Georgia, serif" font-size="10" fill="#ffffff" opacity="0.4" letter-spacing="1">SYNAGOGA TEMPEL · KRAKÓW</text>

  <!-- Bottom caption -->
  <text x="400" y="330" font-family="Georgia, serif" font-size="10" fill="#ffffff" text-anchor="middle" opacity="0.25" letter-spacing="2">„HATÁRON TÚL" · KONCERT EUROPEJSKA PREMIERA</text>
</svg>
