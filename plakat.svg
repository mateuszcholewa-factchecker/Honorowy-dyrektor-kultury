<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 850" width="600" height="850">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a0a00"/>
    </linearGradient>
    <linearGradient id="filmGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8963e"/>
      <stop offset="100%" style="stop-color:#8b3a00"/>
    </linearGradient>
    <clipPath id="circleClip">
      <circle cx="300" cy="310" r="200"/>
    </clipPath>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="850" fill="url(#bgGrad)"/>

  <!-- Grain overlay -->
  <rect width="600" height="850" fill="url(#bgGrad)" filter="url(#grain)" opacity="0.15"/>

  <!-- Top film strip decoration -->
  <rect x="0" y="0" width="600" height="8" fill="#c8963e"/>
  <rect x="0" y="12" width="600" height="2" fill="#c8963e" opacity="0.4"/>

  <!-- Film perforations top -->
  <g fill="#0a0a0a">
    <rect x="8" y="1" width="12" height="6" rx="1"/>
    <rect x="28" y="1" width="12" height="6" rx="1"/>
    <rect x="48" y="1" width="12" height="6" rx="1"/>
    <rect x="68" y="1" width="12" height="6" rx="1"/>
    <rect x="88" y="1" width="12" height="6" rx="1"/>
    <rect x="108" y="1" width="12" height="6" rx="1"/>
