    <rect x="288" y="821" width="12" height="6" rx="1"/>
    <rect x="308" y="821" width="12" height="6" rx="1"/>
    <rect x="328" y="821" width="12" height="6" rx="1"/>
    <rect x="348" y="821" width="12" height="6" rx="1"/>
    <rect x="368" y="821" width="12" height="6" rx="1"/>
    <rect x="388" y="821" width="12" height="6" rx="1"/>
    <rect x="408" y="821" width="12" height="6" rx="1"/>
    <rect x="428" y="821" width="12" height="6" rx="1"/>
    <rect x="448" y="821" width="12" height="6" rx="1"/>
    <rect x="468" y="821" width="12" height="6" rx="1"/>
    <rect x="488" y="821" width="12" height="6" rx="1"/>
    <rect x="508" y="821" width="12" height="6" rx="1"/>
    <rect x="528" y="821" width="12" height="6" rx="1"/>
    <rect x="548" y="821" width="12" height="6" rx="1"/>
    <rect x="568" y="821" width="12" height="6" rx="1"/>
  </g>

  <!-- Corner accents -->
  <g stroke="#c8963e" stroke-width="1.5" fill="none" opacity="0.5">
    <polyline points="30,40 30,60 50,60"/>
    <polyline points="570,40 570,60 550,60"/>
    <polyline points="30,800 30,780 50,780"/>
    <polyline points="570,800 570,780 550,780"/>
  </g>
</svg>
