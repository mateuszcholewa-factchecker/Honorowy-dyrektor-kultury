    <rect x="228" y="1" width="12" height="6" rx="1"/>
    <rect x="248" y="1" width="12" height="6" rx="1"/>
    <rect x="268" y="1" width="12" height="6" rx="1"/>
    <rect x="288" y="1" width="12" height="6" rx="1"/>
    <rect x="308" y="1" width="12" height="6" rx="1"/>
    <rect x="328" y="1" width="12" height="6" rx="1"/>
    <rect x="348" y="1" width="12" height="6" rx="1"/>
    <rect x="368" y="1" width="12" height="6" rx="1"/>
    <rect x="388" y="1" width="12" height="6" rx="1"/>
    <rect x="408" y="1" width="12" height="6" rx="1"/>
    <rect x="428" y="1" width="12" height="6" rx="1"/>
    <rect x="448" y="1" width="12" height="6" rx="1"/>
    <rect x="468" y="1" width="12" height="6" rx="1"/>
    <rect x="488" y="1" width="12" height="6" rx="1"/>
    <rect x="508" y="1" width="12" height="6" rx="1"/>
    <rect x="528" y="1" width="12" height="6" rx="1"/>
    <rect x="548" y="1" width="12" height="6" rx="1"/>
    <rect x="568" y="1" width="12" height="6" rx="1"/>
  </g>

  <!-- Main circle - stylized eye/lens -->
  <circle cx="300" cy="310" r="210" fill="none" stroke="#c8963e" stroke-width="1.5" opacity="0.3"/>
  <circle cx="300" cy="310" r="200" fill="#111"/>
  <circle cx="300" cy="310" r="200" fill="none" stroke="#c8963e" stroke-width="2"/>

  <!-- Geometric film reel inside circle -->
  <!-- Outer ring segments -->
  <g stroke="#c8963e" stroke-width="1" fill="none" opacity="0.6">
    <circle cx="300" cy="310" r="185"/>
    <circle cx="300" cy="310" r="155"/>
    <circle cx="300" cy="310" r="80"/>
    <circle cx="300" cy="310" r="30"/>
  </g>

  <!-- Reel spokes -->
  <g stroke="#c8963e" stroke-width="1.5" opacity="0.5">
    <line x1="300" y1="130" x2="300" y2="490"/>
    <line x1="144" y1="218" x2="456" y2="402"/>
    <line x1="144" y1="402" x2="456" y2="218"/>
  </g>

  <!-- Reel holes -->
  <g fill="#c8963e" opacity="0.8">
    <circle cx="300" cy="185" r="14"/>
    <circle cx="435" cy="267" r="14"/>
    <circle cx="435" cy="353" r="14"/>
    <circle cx="300" cy="435" r="14"/>
    <circle cx="165" cy="353" r="14"/>
    <circle cx="165" cy="267" r="14"/>
  </g>
  <g fill="#111">
    <circle cx="300" cy="185" r="8"/>
    <circle cx="435" cy="267" r="8"/>
    <circle cx="435" cy="353" r="8"/>
    <circle cx="300" cy="435" r="8"/>
    <circle cx="165" cy="353" r="8"/>
    <circle cx="165" cy="267" r="8"/>
  </g>

  <!-- Center hub -->
  <circle cx="300" cy="310" r="30" fill="#c8963e"/>
  <circle cx="300" cy="310" r="20" fill="#111"/>
  <circle cx="300" cy="310" r="8" fill="#c8963e"/>

  <!-- Decorative diagonal line element -->
  <line x1="0" y1="550" x2="600" y2="510" stroke="#c8963e" stroke-width="1" opacity="0.3"/>
  <line x1="0" y1="558" x2="600" y2="518" stroke="#c8963e" stroke-width="0.5" opacity="0.2"/>

  <!-- Edition badge -->
  <rect x="30" y="540" width="110" height="28" fill="none" stroke="#c8963e" stroke-width="1"/>
  <text x="85" y="559" font-family="Georgia, serif" font-size="11" fill="#c8963e" text-anchor="middle" letter-spacing="2">I EDYCJA</text>

  <!-- Main title -->
  <text x="300" y="620" font-family="Georgia, serif" font-size="72" fill="#ffffff" text-anchor="middle" font-weight="bold" letter-spacing="-2">ŚRODEK</text>
  <text x="300" y="688" font-family="Georgia, serif" font-size="72" fill="#c8963e" text-anchor="middle" font-weight="bold" letter-spacing="-2">EKRANU</text>

  <!-- Subtitle line -->
  <rect x="60" y="700" width="480" height="1" fill="#c8963e" opacity="0.5"/>
  <text x="300" y="722" font-family="Georgia, serif" font-size="12" fill="#ffffff" text-anchor="middle" letter-spacing="4" opacity="0.8">FESTIWAL FILMÓW EUROPY ŚRODKOWEJ</text>
  <rect x="60" y="730" width="480" height="1" fill="#c8963e" opacity="0.5"/>

  <!-- Date and location -->
  <text x="300" y="762" font-family="Georgia, serif" font-size="14" fill="#c8963e" text-anchor="middle" letter-spacing="3">POZNAŃ · WRZESIEŃ 2013</text>

  <!-- Kino Muza -->
  <text x="300" y="785" font-family="Georgia, serif" font-size="11" fill="#ffffff" text-anchor="middle" letter-spacing="2" opacity="0.6">KINO MUZA · UL. ŚW. MARCIN 30</text>

  <!-- Bottom film strip -->
  <rect x="0" y="820" width="600" height="8" fill="#c8963e"/>
  <rect x="0" y="816" width="600" height="2" fill="#c8963e" opacity="0.4"/>

  <!-- Film perforations bottom -->
  <g fill="#0a0a0a">
    <rect x="8" y="821" width="12" height="6" rx="1"/>
    <rect x="28" y="821" width="12" height="6" rx="1"/>
    <rect x="48" y="821" width="12" height="6" rx="1"/>
