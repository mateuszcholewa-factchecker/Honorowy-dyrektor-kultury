<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f0eb"/>
      <stop offset="100%" style="stop-color:#e8ddd0"/>
    </linearGradient>
    <linearGradient id="darkG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1208"/>
      <stop offset="100%" style="stop-color:#2d1f0a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgG)"/>

  <!-- Dark left panel -->
  <rect x="0" y="0" width="320" height="400" fill="url(#darkG)"/>

  <!-- Diagonal slice -->
  <polygon points="280,0 320,0 320,400 240,400" fill="#c8963e"/>
  <polygon points="240,0 280,0 240,400 200,400" fill="#8b3a00" opacity="0.4"/>

  <!-- Left panel: abstract forms -->
  <!-- Large circle fragment -->
  <circle cx="120" cy="200" r="140" fill="none" stroke="#c8963e" stroke-width="1.5" opacity="0.4"/>
  <circle cx="120" cy="200" r="100" fill="none" stroke="#c8963e" stroke-width="1" opacity="0.3"/>

  <!-- Geometric shapes on left -->
  <rect x="30" y="60" width="80" height="80" fill="none" stroke="#c8963e" stroke-width="1.5" transform="rotate(15 70 100)"/>
  <rect x="50" y="80" width="80" height="80" fill="#c8963e" opacity="0.15" transform="rotate(15 90 120)"/>

  <!-- Vertical lines -->
  <g stroke="#c8963e" stroke-width="0.8" opacity="0.3">
    <line x1="20" y1="0" x2="20" y2="400"/>
    <line x1="40" y1="0" x2="40" y2="400"/>
    <line x1="60" y1="0" x2="60" y2="400"/>
  </g>

  <!-- Triangle -->
  <polygon points="80,290 160,290 120,210" fill="none" stroke="#c8963e" stroke-width="1.5" opacity="0.6"/>
  <polygon points="80,290 160,290 120,210" fill="#c8963e" opacity="0.1"/>

  <!-- Right panel: exhibition title area -->
  <!-- Horizontal rule top -->
  <line x1="350" y1="60" x2="770" y2="60" stroke="#8b3a00" stroke-width="1" opacity="0.4"/>

  <!-- Exhibition label -->
  <text x="350" y="50" font-family="Georgia, serif" font-size="10" fill="#8b3a00" letter-spacing="4" opacity="0.7">GALERIA ARSENAŁ · BIAŁYSTOK · 2012</text>

  <!-- Main title -->
  <text x="350" y="140" font-family="Georgia, serif" font-size="58" fill="#1a1208" font-weight="bold" letter-spacing="-1">FORMY</text>
  <text x="350" y="210" font-family="Georgia, serif" font-size="58" fill="#8b3a00" font-weight="bold" letter-spacing="-1">I PRZESTRZENIE</text>

  <!-- Subtitle -->
  <line x1="350" y1="230" x2="770" y2="230" stroke="#8b3a00" stroke-width="1" opacity="0.4"/>
  <text x="350" y="255" font-family="Georgia, serif" font-size="13" fill="#1a1208" letter-spacing="2" opacity="0.7">WYSTAWA ZBIOROWA SZTUKI NIEZALEŻNEJ</text>

  <!-- Abstract dots pattern -->
  <g fill="#8b3a00" opacity="0.2">
    <circle cx="380" cy="300" r="3"/>
    <circle cx="400" cy="300" r="3"/>
    <circle cx="420" cy="300" r="3"/>
    <circle cx="440" cy="300" r="3"/>
    <circle cx="460" cy="300" r="3"/>
    <circle cx="480" cy="300" r="3"/>
    <circle cx="500" cy="300" r="3"/>
    <circle cx="380" cy="320" r="3"/>
    <circle cx="400" cy="320" r="3"/>
    <circle cx="420" cy="320" r="3"/>
    <circle cx="440" cy="320" r="3"/>
  </g>

  <!-- Curator info -->
  <text x="350" y="300" font-family="Georgia, serif" font-size="12" fill="#1a1208" opacity="0.5">kuratorka: dr Joanna Wiśniewska</text>
  <text x="350" y="320" font-family="Georgia, serif" font-size="12" fill="#1a1208" opacity="0.5">patronat: Mateusz Holewa, Honorowy Minister Kultury RP</text>

  <!-- Date block -->
  <rect x="350" y="345" width="120" height="38" fill="#8b3a00"/>
  <text x="410" y="360" font-family="Georgia, serif" font-size="10" fill="#f5f0eb" text-anchor="middle" letter-spacing="1">OTWARCIE</text>
  <text x="410" y="376" font-family="Georgia, serif" font-size="11" fill="#f5f0eb" text-anchor="middle" font-weight="bold">5.XI.2012</text>

  <!-- Bottom rule -->
  <line x1="350" y1="395" x2="770" y2="395" stroke="#8b3a00" stroke-width="1" opacity="0.3"/>

  <!-- Corner mark -->
  <g stroke="#8b3a00" stroke-width="1" fill="none" opacity="0.4">
    <polyline points="755,70 775,70 775,90"/>
    <polyline points="755,390 775,390 775,370"/>
  </g>
</svg>
